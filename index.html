<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>国民经济行业分类查询</title>
  <!-- pinyin-pro 拼音库 -->
  <script src="https://cdn.jsdelivr.net/npm/pinyin-pro/dist/index.js"></script>
  <style>
    /* CSS 变量 - 亮色主题 */
    :root {
      --bg-primary: #F5F5F5;
      --bg-secondary: #FFFFFF;
      --bg-header: #1976D2;
      --bg-title: #1565C0;
      --text-primary: #333333;
      --text-secondary: #666666;
      --text-muted: #999999;
      --border-color: #E0E0E0;
      --hover-bg: #E3F2FD;
      --highlight-bg: #FFEB3B;
      --highlight-hover: #FDD835;
      --shadow: rgba(0, 0, 0, 0.15);
      --code-color: #1976D2;
      --toggle-icon: #757575;
      --match-border: #1565C0; /* 匹配边框 - 亮色深蓝 */
    }

    /* 暗黑主题 */
    body.dark {
      --bg-primary: #1a1a2e;
      --bg-secondary: #16213e;
      --bg-header: #0f3460;
      --bg-title: #0a1929;
      --text-primary: #E0E0E0;
      --text-secondary: #B0B0B0;
      --text-muted: #808080;
      --border-color: #2a2a4a;
      --hover-bg: #1f4068;
      --highlight-bg: #f9a825;
      --highlight-hover: #f57f17;
      --shadow: rgba(0, 0, 0, 0.4);
      --code-color: #64B5F6;
      --toggle-icon: #B0B0B0;
      --match-border: #f9a825; /* 匹配边框 - 暗色黄色 */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      transition: background-color 0.3s, color 0.3s;
    }

    /* 顶部标题 */
    .page-title {
      background-color: var(--bg-title);
      padding: 20px;
      text-align: center;
      color: white;
    }

    .page-title h1 {
      font-size: 24px;
      font-weight: 500;
      margin: 0;
    }

    /* 顶部搜索区域 */
    .search-header {
      background-color: var(--bg-header);
      padding: 20px;
      box-shadow: 0 2px 8px var(--shadow);
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
    }

    .search-container {
      flex: 1;
      max-width: 900px;
      display: flex;
      gap: 10px;
    }

    .search-input {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      outline: none;
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .search-input::placeholder {
      color: var(--text-muted);
    }

    .search-input:focus {
      box-shadow: 0 0 0 3px rgba(33, 150, 243, 0.4);
    }

    .clear-btn, .theme-btn {
      padding: 12px 20px;
      background-color: #2196F3;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background-color 0.2s;
    }

    .clear-btn:hover, .theme-btn:hover {
      background-color: #1565C0;
    }

    .clear-btn:active, .theme-btn:active {
      background-color: #0D47A1;
    }

    /* 主题切换按钮图标 */
    .theme-btn::before {
      content: '🌙';
    }

    body.dark .theme-btn::before {
      content: '☀️';
    }

    /* 主内容区域 */
    .main-content {
      max-width: 900px;
      margin: 20px auto;
      padding: 0 20px 40px;
    }

    /* 树容器 */
    .tree-container {
      background: var(--bg-secondary);
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 2px 8px var(--shadow);
      transition: background-color 0.3s;
    }

    /* 统计信息 */
    .stats {
      padding: 10px 0 20px;
      color: var(--text-secondary);
      font-size: 14px;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 15px;
    }

    /* 树节点 */
    .tree-node {
      user-select: none;
      margin: 0;
      padding: 0;
    }

    .node-content {
      display: flex;
      align-items: center;
      padding: 6px 8px;
      border-radius: 4px;
      cursor: pointer;
      background-color: transparent;
      transition: background-color 0.2s;
      gap: 6px;
    }

    .node-content:hover {
      background-color: var(--hover-bg);
    }

    /* 匹配节点（边框） */
    .node-content.matched {
      background-color: transparent;
      border: 2px solid var(--match-border);
      border-radius: 4px;
    }

    .node-content.matched:hover {
      background-color: var(--hover-bg);
    }

    /* 高亮匹配节点 */
    .node-content.highlight {
      background-color: var(--highlight-bg);
    }

    .node-content.highlight:hover {
      background-color: var(--highlight-hover);
    }

    /* 详情中高亮的关键字 */
    .desc-highlight {
      background-color: var(--highlight-bg);
      padding: 0 2px;
    }

    /* 名称中高亮的关键字 */
    .name-highlight {
      background-color: var(--highlight-bg);
      padding: 0 2px;
      border-radius: 2px;
    }

    /* 展开指示器 */
    .toggle-icon {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--toggle-icon);
      transition: transform 0.3s ease;
      flex-shrink: 0;
    }

    .toggle-icon.expanded {
      transform: rotate(90deg);
    }

    .toggle-icon.no-children {
      visibility: hidden;
    }

    /* 节点代码 */
    .node-code {
      font-family: 'Consolas', 'Monaco', monospace;
      font-size: 13px;
      color: var(--code-color);
      min-width: 50px;
      flex-shrink: 0;
    }

    /* 节点名称 */
    .node-name {
      font-size: 14px;
      color: var(--text-primary);
      flex: 1;
    }

    /* 子节点容器 */
    .children-container {
      padding-left: 24px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease;
    }

    .children-container.expanded {
      max-height: none;
      opacity: 1;
    }

    /* 详细说明 */
    .description-panel {
      margin: 0;
      padding: 0;
      color: var(--text-secondary);
      font-size: 12px;
      line-height: 1.6;
      display: none;
    }

    .description-panel.expanded {
      display: block;
      padding: 12px 16px 12px 44px;
    }

    .description-content {
      white-space: pre-line;
      color: var(--text-secondary);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-state-text {
      font-size: 16px;
    }

    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-secondary);
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #E3F2FD;
      border-top-color: #2196F3;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* 滚动条美化 */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* 根节点样式 */
    .root-node .node-content {
      padding: 10px 12px;
      background: linear-gradient(135deg, var(--bg-header), var(--bg-title));
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .root-node .node-name {
      font-size: 16px;
      font-weight: bold;
      color: white;
    }

    /* 主题切换按钮 */
    .theme-toggle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .theme-toggle:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.1);
    }

    .theme-toggle:active {
      transform: scale(0.95);
    }

    .theme-toggle .sun,
    .theme-toggle .moon {
      position: absolute;
      font-size: 20px;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .theme-toggle .sun {
      opacity: 1;
      transform: rotate(0deg) scale(1);
    }

    .theme-toggle .moon {
      opacity: 0;
      transform: rotate(-180deg) scale(0);
    }

    body.dark .theme-toggle .sun {
      opacity: 0;
      transform: rotate(180deg) scale(0);
    }

    body.dark .theme-toggle .moon {
      opacity: 1;
      transform: rotate(0deg) scale(1);
    }

    /* 主题切换动画背景 */
    .theme-toggle::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(255,255,255,0.3) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .theme-toggle:hover::before {
      opacity: 1;
    }

    /* 增强模式按钮 */
    .enhanced-toggle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.15);
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .enhanced-toggle:hover {
      background: rgba(255, 255, 255, 0.25);
      transform: scale(1.1);
    }

    .enhanced-toggle:active {
      transform: scale(0.95);
    }

    .enhanced-toggle .icon {
      position: absolute;
      font-size: 18px;
      transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    .enhanced-toggle .off {
      opacity: 1;
      transform: scale(1);
    }

    .enhanced-toggle .on {
      opacity: 0;
      transform: scale(0);
    }

    body.enhanced .enhanced-toggle .off {
      opacity: 0;
      transform: scale(0);
    }

    body.enhanced .enhanced-toggle .on {
      opacity: 1;
      transform: scale(1);
    }

    /* 增强模式下增强按钮颜色 */
    body.enhanced .enhanced-toggle {
      background: rgba(76, 175, 80, 0.3);
      border-color: rgba(76, 175, 80, 0.6);
    }

    body.enhanced .enhanced-toggle:hover {
      background: rgba(76, 175, 80, 0.4);
    }

    /* 标签样式 */
    .tag-badge {
      font-size: 11px;
      padding: 2px 6px;
      border-radius: 3px;
      background-color: #90EE90;
      color: #2E7D32;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .tag-badge.no-star {
      background-color: #90EE90;
      color: #2E7D32;
    }

    .tag-badge.no-star:hover {
      background-color: #228B22;
    }

    body.dark .tag-badge {
      background-color: #3E5C28;
      color: #A5D6A7;
    }

    body.dark .tag-badge.no-star {
      background-color: #3E5C28;
      color: #A5D6A7;
    }

    .tag-badge.has-detail {
      cursor: pointer;
      text-decoration: underline;
      text-decoration-style: dotted;
      text-underline-offset: 2px;
      background-color: #FFF8DC;
      color: #8B6914;
    }

    body.dark .tag-badge.has-detail {
      background-color: #5C4A2A;
      color: #D4C4A8;
    }

    .tag-badge.no-star:hover {
      background-color: #66CDAA;
    }

    body.dark .tag-badge.no-star:hover {
      background-color: #4A6741;
    }

    .tag-badge.has-detail:hover {
      background-color: #F0C000;
    }

    body.dark .tag-badge.has-detail:hover {
      background-color: #8B6914;
    }

    /* 标签容器 */
    .tags-container {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-left: 8px;
    }

    /* 浮窗样式 */
    .tag-popup {
      position: fixed;
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 10px 14px;
      box-shadow: 0 4px 12px var(--shadow);
      z-index: 1000;
      max-width: 280px;
      font-size: 12px;
    }
      line-height: 1.5;
      color: var(--text-primary);
      display: none;
    }

    .tag-popup.visible {
      display: block;
    }

    .tag-popup .popup-category {
      color: var(--text-primary);
      margin-bottom: 6px;
      line-height: 1.6;
    }

    .tag-popup .popup-content {
      color: var(--text-secondary);
      background: #FFF8DC;
      border-top: 1px solid var(--border-color);
      padding: 6px 8px;
      margin-top: 6px;
    }

    .tag-popup .popup-code {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="page-title">
    <h1>国民经济行业分类查询系统</h1>
  </div>

  <header class="search-header">
    <div class="search-container">
      <input
        type="text"
        class="search-input"
        id="searchInput"
        placeholder="输入行业代码或名称搜索（如：0111、稻谷）"
      >
      <button class="clear-btn" id="clearBtn">重置</button>
    </div>
    <button class="theme-toggle" id="themeToggle" title="切换主题">
      <span class="sun">☀️</span>
      <span class="moon">🌙</span>
    </button>
    <button class="enhanced-toggle" id="enhancedToggle" title="增强模式">
      <span class="icon off">📎</span>
      <span class="icon on">🔗</span>
    </button>
  </header>

  <main class="main-content">
    <div class="tree-container">
      <div class="stats" id="stats"></div>
      <div id="treeContent">
        <div class="loading">
          <div class="loading-spinner"></div>
          <div>加载中...</div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // 标签定义
    const TAGS_MAP = {
      "highTech_mfg": "高制",
      "highTech_svc": "高服",
      "ip密集型": "知识",
      "strategic": "战兴",
      "digital": "数字",
      "pension": "养老",
      "culture": "文化"
    };

    // 全局数据
    let treeData = null;
    let currentHighlighted = new Set();
    let expandedNodes = new Set();
    let isSearching = false; // 标记是否处于搜索模式
    let originalTreeHTML = ''; // 保存原始树HTML
    let isEnhancedMode = false; // 增强模式状态

    // DOM 元素
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    const treeContent = document.getElementById('treeContent');
    const statsEl = document.getElementById('stats');
    const themeToggle = document.getElementById('themeToggle');
    const enhancedToggle = document.getElementById('enhancedToggle');

    // 主题切换
    function initTheme() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark');
      }
    }

    function toggleTheme() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    themeToggle.addEventListener('click', toggleTheme);

    // 增强模式切换
    function toggleEnhancedMode() {
      isEnhancedMode = !isEnhancedMode;
      document.body.classList.toggle('enhanced', isEnhancedMode);
      localStorage.setItem('enhanced', isEnhancedMode ? 'true' : 'false');
      // 重新渲染树以应用/移除标签
      reloadTree();
    }

    enhancedToggle.addEventListener('click', toggleEnhancedMode);

    function initEnhancedMode() {
      const savedEnhanced = localStorage.getItem('enhanced');
      if (savedEnhanced === 'true') {
        isEnhancedMode = true;
        document.body.classList.add('enhanced');
      }
    }

    // 初始化
    async function init() {
      initTheme(); // 初始化主题
      initEnhancedMode(); // 初始化增强模式
      try {
        const dataFile = isEnhancedMode ? './data/industry_tree_advanced.json' : './data/industry_tree_basic.json';
        const response = await fetch(dataFile);
        if (!response.ok) {
          throw new Error(`HTTP error! status: ${response.status}`);
        }
        treeData = await response.json();
        treeContent.innerHTML = ''; // 清除加载状态

        // 问题1：如果根节点名称为"根节点"或"国民经济行业分类"，直接渲染其 children
        if (treeData.name === '根节点' || treeData.name === '国民经济行业分类') {
          if (treeData.children && treeData.children.length > 0) {
            treeData.children.forEach(child => {
              renderTree(child, treeContent, false, '');
            });
          }
        } else {
          renderTree(treeData, treeContent, false);
        }
        // 保存原始树HTML
        originalTreeHTML = treeContent.innerHTML;
        updateStats();
      } catch (error) {
        treeContent.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <div class="empty-state-text">数据加载失败: ${error.message}</div>
          </div>
        `;
        console.error('数据加载失败:', error);
      }
    }

    // 重新加载树
    function reloadTree() {
      treeContent.innerHTML = `
        <div class="loading">
          <div class="loading-spinner"></div>
          <div>加载中...</div>
        </div>
      `;
      originalTreeHTML = '';
      expandedNodes.clear();
      currentHighlighted.clear();
      init();
    }

        function renderTree(node, container, shouldExpand = false, menleiLetter = '') {
      const isRoot = node.level === 0;
      const hasChildren = node.children && node.children.length > 0;
      const isLevel4 = node.level === 4;

      // 计算完整代码：门类字母 + 当前节点代码
      let fullCode = node.code;
      if (!isRoot) {
        if (menleiLetter) {
          // 有门类字母，说明是非门类节点
          fullCode = menleiLetter + node.code;
        } else if (/^[A-Z]$/.test(node.code)) {
          // 门类节点本身，保持原样
          fullCode = node.code;
        }
      }

      // 创建节点包装器
      const nodeWrapper = document.createElement('div');
      nodeWrapper.className = `tree-node${isRoot ? ' root-node' : ''}`;
      nodeWrapper.dataset.code = node.code;

      // 节点内容
      const content = document.createElement('div');
      content.className = 'node-content';
      content.dataset.code = node.code;
      content.dataset.level = node.level;

      // 展开指示器
      const toggleIcon = document.createElement('span');
      toggleIcon.className = `toggle-icon${hasChildren ? '' : ' no-children'}`;
      toggleIcon.textContent = hasChildren ? '▶' : '';
      content.appendChild(toggleIcon);

      // 根节点隐藏代码
      if (!isRoot) {
        const codeSpan = document.createElement('span');
        codeSpan.className = 'node-code';
        codeSpan.textContent = fullCode;
        content.appendChild(codeSpan);
      }

      // 名称
      const nameSpan = document.createElement('span');
      nameSpan.className = 'node-name';
      nameSpan.textContent = node.name;
      content.appendChild(nameSpan);

      // 增强模式：四级节点显示标签
      if (isEnhancedMode && isLevel4 && node.tags && node.tags.length > 0) {
        const tagsContainer = document.createElement('span');
        tagsContainer.className = 'tags-container';
        node.tags.forEach(tag => {
          const tagBadge = document.createElement('span');
          tagBadge.className = 'tag-badge';
          const tagDetail = node.tagDetail && node.tagDetail[tag];
          if (tagDetail) {
            const hasDescription = tagDetail.description && tagDetail.description.trim();
            const hasProducts = tagDetail.products && tagDetail.products.length > 0;
            if (hasDescription || hasProducts) {
              tagBadge.classList.add('has-detail');  // 米黄色
            } else {
              tagBadge.classList.add('no-star');  // 浅绿色
            }
            tagBadge.dataset.tagKey = tag;
            tagBadge.dataset.category = tagDetail.category || '';
            tagBadge.dataset.description = tagDetail.description || '';
            tagBadge.dataset.categories = JSON.stringify(tagDetail.categories || []);
            tagBadge.dataset.products = JSON.stringify(tagDetail.products || []);
            tagBadge.addEventListener('click', showTagPopup);
          }
          tagBadge.textContent = TAGS_MAP[tag] || tag;
          tagsContainer.appendChild(tagBadge);
        });
        content.appendChild(tagsContainer);
      }

      nodeWrapper.appendChild(content);

      // 详细说明面板（仅4位节点）- 无标题行，直接显示内容
      let descPanel = null;
      if (isLevel4 && node.description !== undefined && node.description !== null) {
        descPanel = document.createElement('div');
        descPanel.className = 'description-panel';
        descPanel.dataset.code = node.code;
        descPanel.innerHTML = `<div class="description-content">${node.description || '（暂无详细说明）'}</div>`;
        nodeWrapper.appendChild(descPanel);
      }

      // 子节点容器
      let childrenContainer = null;
      if (hasChildren) {
        childrenContainer = document.createElement('div');
        childrenContainer.className = 'children-container';
        childrenContainer.dataset.code = node.code;

        // 向下传递门类字母（用于显示完整代码）
        const childMenlei = (/^[A-Z]$/.test(node.code)) ? node.code : menleiLetter;
        node.children.forEach(child => {
          renderTree(child, childrenContainer, shouldExpand, childMenlei);
        });

        nodeWrapper.appendChild(childrenContainer);

        // 事件处理：点击切换展开/折叠
        content.addEventListener('click', (e) => {
          e.stopPropagation();
          toggleNode(node.code, toggleIcon, childrenContainer);
        });

        // 初始展开/折叠状态
        if (shouldExpand) {
          toggleIcon.classList.add('expanded');
          childrenContainer.classList.add('expanded');
          expandedNodes.add(node.code);
        }
      } else {
        // 无子节点时点击4位节点只显示详细说明
        if (isLevel4) {
          content.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleDescription(node.code);
          });
        }
      }

      container.appendChild(nodeWrapper);
    }

    // 切换节点展开/折叠
    function toggleNode(code, toggleIcon, childrenContainer) {
      const isExpanded = toggleIcon.classList.contains('expanded');

      if (isExpanded) {
        toggleIcon.classList.remove('expanded');
        childrenContainer.classList.remove('expanded');
        expandedNodes.delete(code);
      } else {
        toggleIcon.classList.add('expanded');
        childrenContainer.classList.add('expanded');
        expandedNodes.add(code);
      }
    }

    // 浮窗显示函数
    let currentPopup = null;

    function showTagPopup(e) {
      e.stopPropagation();
      e.preventDefault();

      // 关闭现有浮窗
      closeTagPopup();

      const badge = e.target;
      const tagKey = badge.dataset.tagKey;
      const category = badge.dataset.category;
      let description = badge.dataset.description;
      const categoriesJson = badge.dataset.categories;
      const productsJson = badge.dataset.products;
      const categoriesList = categoriesJson ? JSON.parse(categoriesJson) : [];

      // 如果description为空且has_star为false，显示"涵盖本行业所有类目"
      if (!description && badge.classList.contains('no-star')) {
        description = '涵盖本行业所有类目';
      }

      let categoryLines = '';
      let sectionsHtml = '';

      let popup;  // 在外部声明，供 updatePopupPosition 访问

      const isStrategic = tagKey === 'strategic';

      if (isStrategic) {
        // strategic标签：新结构 categories: [{path, products}, ...]
        const categoriesData = categoriesList.length > 0 ? categoriesList : [];

        let contentHtml = '';

        categoriesData.forEach((catData, idx) => {
          const catPath = catData.path || category;
          const catProducts = catData.products || [];

          // 显示分类层级
          const parts = catPath.split(' > ');
          const lines = parts.map((c, i) => {
            if (i === 0) return `<div style="color: var(--text-primary);">${c}</div>`;
            const prefix = i === 1 ? '— ' : '—— ';
            return `<div style="color: var(--text-primary);">${prefix}${c}</div>`;
          });
          contentHtml += lines.join('');

          // 显示products
          if (catProducts.length > 0) {
            contentHtml += `<div class="popup-content">产品：${catProducts.join('、')}</div>`;
          } else {
            contentHtml += `<div class="popup-content">涵盖本行业所有类目</div>`;
          }
        });

        popup = document.createElement('div');
        popup.className = 'tag-popup has-detail';
        popup.innerHTML = contentHtml;
      } else {
        // 普通标签：按 > 分隔成多行显示
        const parts = category ? category.split(' > ') : [];
        const lines = parts.map((c, i) => {
          if (i === 0) return `<div style="color: var(--text-primary);">${c}</div>`;
          const prefix = i === 1 ? '— ' : '—— ';
          return `<div style="color: var(--text-primary);">${prefix}${c}</div>`;
        });
        categoryLines = lines.join('');

        const hasDescription = description && description.trim();
        const descriptionHtml = hasDescription ? `<div class="popup-content">${description}</div>` : '';

        popup = document.createElement('div');
        popup.className = 'tag-popup' + (hasDescription ? ' has-detail' : '');
        popup.innerHTML = `
          ${categoryLines}
          ${descriptionHtml}
        `;
      }

      document.body.appendChild(popup);
      currentPopup = popup;

      // 计算浮窗位置
      function updatePopupPosition() {
        const rect = badge.getBoundingClientRect();
        const popupRect = popup.getBoundingClientRect();

        let left = rect.left;
        let top = rect.bottom + 5;

        // 确保浮窗不超出右边界
        if (left + popupRect.width > window.innerWidth - 10) {
          left = window.innerWidth - popupRect.width - 10;
        }
        // 确保浮窗不超出左边界
        if (left < 10) {
          left = 10;
        }
        // 检测下边界
        if (top + popupRect.height > window.innerHeight - 10) {
          top = rect.top - popupRect.height - 5;
        }

        popup.style.left = left + 'px';
        popup.style.top = top + 'px';
      }

      updatePopupPosition();

      // 监听滚动事件，关闭浮窗
      const scrollHandler = () => {
        closeTagPopup();
      };
      window.addEventListener('scroll', scrollHandler, true);
      popup._scrollHandler = scrollHandler;

      // 延迟显示以应用过渡效果
      setTimeout(() => {
        popup.classList.add('visible');
      }, 10);
    }

    function closeTagPopup() {
      if (currentPopup) {
        if (currentPopup._scrollHandler) {
          window.removeEventListener('scroll', currentPopup._scrollHandler, true);
        }
        currentPopup.remove();
        currentPopup = null;
      }
    }

    // 点击外部关闭浮窗
    document.addEventListener('click', (e) => {
      if (currentPopup && !currentPopup.contains(e.target) && !e.target.classList.contains('tag-badge')) {
        closeTagPopup();
      }
    });

    // 切换详细说明显示
    function toggleDescription(code) {
      const panel = document.querySelector(`.description-panel[data-code="${code}"]`);
      if (!panel) return;

      const isExpanded = panel.classList.contains('expanded');

      if (isExpanded) {
        panel.classList.remove('expanded');
      } else {
        panel.classList.add('expanded');
      }
    }

    // 搜索功能 - 在原有树上展开并高亮
    function performSearch(query) {
      // 清除之前的高亮
      clearHighlights();

      if (!query.trim()) {
        updateStats();
        return;
      }

      const lowerQuery = query.toLowerCase();

      // 检查是否为2个字母的拼音输入（仅显示提示，不阻断搜索）
      const isTwoCharPinyin = lowerQuery.length === 2 && /^[a-z]+$/.test(lowerQuery);
      let pinyinTip = '';
      if (isTwoCharPinyin) {
        pinyinTip = '拼音码至少输入三位';
      }

      // 1. 找到所有匹配节点
      const matchedNodes = [];
      function searchInNode(node) {
        let matched = false;
        let matchedType = ''; // 'code', 'name', 'pinyin', 'description'
        let matchedInfo = null; // 匹配详情（拼音匹配时的位置等）

        // 检查 code 匹配
        if (node.code.toLowerCase().includes(lowerQuery)) {
          matched = true;
          matchedType = 'code';
        }

        // 检查 name 匹配
        if (node.name.toLowerCase().includes(lowerQuery)) {
          matched = true;
          matchedType = 'name';
        }

        // 检查拼音匹配（如：输入 dgzz 匹配 "稻谷种植"，输入 jht 匹配 "合成纤维单(聚合)体制造"）
        if (lowerQuery.length >= 3 && /^[a-z]+$/.test(lowerQuery)) {
          // 使用 pinyin-pro 获取首字母和全拼（无声调）
          const firstPinyin = pinyinPro.pinyin(node.name, { pattern: 'first', toneType: 'none' }).replace(/\s/g, '');
          const fullPinyin = pinyinPro.pinyin(node.name, { toneType: 'none' }).replace(/\s/g, '');

          // 检查首字母匹配（支持开头和中间匹配）
          const firstMatch = firstPinyin.startsWith(lowerQuery) || firstPinyin === lowerQuery || firstPinyin.includes(lowerQuery);
          // 检查全拼匹配（前缀匹配）
          const fullMatch = fullPinyin.startsWith(lowerQuery) || fullPinyin.includes(lowerQuery);

          if (firstMatch || fullMatch) {
            matched = true;
            matchedType = 'pinyin';
            // 记录是首字母匹配还是全拼匹配
            matchedInfo = [0, node.name.length, firstMatch ? 'first' : 'full'];
          }
        }

        // 仅4位节点检查 description 匹配（仅当名称未匹配时才设置）
        if (!matched && node.level === 4 && node.description) {
          if (node.description.toLowerCase().includes(lowerQuery)) {
            matched = true;
            matchedType = 'description';
          }
        }

        if (matched) {
          matchedNodes.push({ node, matchedType, matchedInfo });
        }

        // 递归搜索子节点
        if (node.children) {
          node.children.forEach(child => searchInNode(child));
        }
      }

      searchInNode(treeData);

      // 2. 显示统计信息（包含拼音提示和匹配模式）
      if (matchedNodes.length === 0) {
        updateStats(0, pinyinTip || null);
        return;
      }

      // 判断匹配模式：根据实际匹配类型判断
      let matchMode = '';
      if (/^[a-z]+$/.test(lowerQuery)) {
        // 检查是否有全拼匹配
        const hasFullMatch = matchedNodes.some(m => m.matchedType === 'pinyin' && m.matchedInfo && m.matchedInfo[2] === 'full');
        // 检查是否有首字母匹配
        const hasFirstMatch = matchedNodes.some(m => m.matchedType === 'pinyin' && m.matchedInfo && m.matchedInfo[2] === 'first');

        if (hasFullMatch && !hasFirstMatch) {
          matchMode = '全拼匹配';
        } else if (hasFirstMatch && !hasFullMatch) {
          matchMode = '首字母匹配';
        } else {
          // 混合或未知
          matchMode = '拼音匹配';
        }
      } else {
        matchMode = '精确匹配';
      }

      const pinyinPrefix = pinyinTip ? `${pinyinTip}，` : '';

      // 收集拼音匹配的关键字（显示完整节点名称）
      let matchedKeywords = [];
      matchedNodes.forEach(match => {
        if (match.matchedType === 'pinyin') {
          const name = match.node.name;
          if (name && !matchedKeywords.includes(name)) {
            matchedKeywords.push(name);
          }
        }
      });

      const keywordInfo = matchedKeywords.length > 0 ? `「${matchedKeywords.join('、')}」` : '';
      updateStats(matchedNodes.length, pinyinPrefix + `找到 ${matchedNodes.length} 个匹配结果（${matchMode}）${keywordInfo}`);

      // 3. 展开并高亮匹配节点
      matchedNodes.forEach(match => {
        const { node, matchedType, matchedInfo } = match;
        // 获取完整路径（祖先节点）
        const ancestors = getNodePath(node);

        // 展开所有祖先节点
        ancestors.forEach(ancestor => {
          expandNode(ancestor.code);
        });

        // 高亮匹配的文字
        highlightName(node, matchedType, matchedInfo, query);

        // 如果是4位节点且有详情，也要高亮详情中的关键字
        if (node.level === 4 && node.description) {
          if (node.description.toLowerCase().includes(query.toLowerCase())) {
            highlightDescription(node.code, query);
          }
        }
      });

      // 滚动到第一个匹配节点
      if (matchedNodes.length > 0) {
        const firstMatch = matchedNodes[0].node;
        const content = document.querySelector(`.node-content[data-code="${firstMatch.code}"]`);
        if (content) {
          setTimeout(() => {
            content.scrollIntoView({ behavior: 'smooth', block: 'center' });
          }, 100);
        }
      }
    }

    // 获取父节点
    function getParentNode(targetNode) {
      let parent = null;

      function findParent(node) {
        if (node.children) {
          for (const child of node.children) {
            if (child.code === targetNode.code) {
              parent = node;
              return true;
            }
            if (findParent(child)) {
              return true;
            }
          }
        }
        return false;
      }

      findParent(treeData);
      return parent;
    }

    // 获取节点路径
    function getNodePath(targetNode) {
      const path = [];

      function findPath(node, currentPath) {
        if (node.code === targetNode.code) {
          path.push(...currentPath);
          return true;
        }

        if (node.children) {
          for (const child of node.children) {
            if (findPath(child, [...currentPath, node])) {
              return true;
            }
          }
        }

        return false;
      }

      findPath(treeData, []);
      return path;
    }

    // 计算完整代码（带门类前缀）
    function getFullCode(node, parentCode = '') {
      if (parentCode) {
        return parentCode + node.code;
      }
      return node.code;
    }

    // 渲染过滤后的树
    function renderFilteredTree(node, container, visibleNodes, matchedNodes) {
      const isRoot = node.level === 0;
      const hasChildren = node.children && node.children.length > 0;
      const isLevel4 = node.level === 4;
      const isMatched = matchedNodes.some(n => n.code === node.code);

      // 如果节点不在可见集合中，不渲染
      if (!visibleNodes.has(node.code)) {
        return;
      }

      // 创建节点包装器
      const nodeWrapper = document.createElement('div');
      nodeWrapper.className = `tree-node${isRoot ? ' root-node' : ''}`;
      nodeWrapper.dataset.code = node.code;

      // 节点内容
      const content = document.createElement('div');
      content.className = 'node-content';
      if (isMatched) {
        content.classList.add('highlight');
        currentHighlighted.add(node.code);
      }
      content.dataset.code = node.code;
      content.dataset.level = node.level;

      // 展开指示器
      const toggleIcon = document.createElement('span');
      toggleIcon.className = `toggle-icon${hasChildren ? '' : ' no-children'}`;
      toggleIcon.textContent = hasChildren ? '▶' : '';
      // 搜索模式下默认展开所有可见节点
      if (hasChildren) {
        toggleIcon.classList.add('expanded');
      }
      content.appendChild(toggleIcon);

      // 根节点隐藏代码
      if (!isRoot) {
        const codeSpan = document.createElement('span');
        codeSpan.className = 'node-code';
        codeSpan.textContent = node.code;
        content.appendChild(codeSpan);
      }

      // 名称
      const nameSpan = document.createElement('span');
      nameSpan.className = 'node-name';
      nameSpan.textContent = node.name;
      content.appendChild(nameSpan);

      nodeWrapper.appendChild(content);

      // 详细说明面板（仅4位节点）- 只有命中的节点才默认展开
      let descPanel = null;
      if (isLevel4 && node.description) {
        descPanel = document.createElement('div');
        descPanel.className = `description-panel${isMatched ? ' expanded' : ''}`;
        descPanel.dataset.code = node.code;
        descPanel.innerHTML = `<div class="description-content">${node.description}</div>`;
        nodeWrapper.appendChild(descPanel);
      }

      // 子节点容器 - 搜索模式下默认折叠，由用户手动点击展开
      if (hasChildren) {
        const childrenContainer = document.createElement('div');
        childrenContainer.className = 'children-container'; // 默认折叠
        childrenContainer.dataset.code = node.code;

        // 只渲染可见的子节点
        node.children.forEach(child => {
          if (visibleNodes.has(child.code)) {
            renderFilteredTree(child, childrenContainer, visibleNodes, matchedNodes);
          }
        });

        nodeWrapper.appendChild(childrenContainer);
      }

      container.appendChild(nodeWrapper);

      // 滚动到第一个匹配节点
      if (isMatched) {
        setTimeout(() => {
          content.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 100);
      }
    }

    // 展开所有祖先节点
    function expandAllAncestors(nodesToExpand) {
      nodesToExpand.forEach(code => {
        if (!expandedNodes.has(code)) {
          const childrenContainer = document.querySelector(`.children-container[data-code="${code}"]`);
          const nodeContent = document.querySelector(`.node-content[data-code="${code}"]`);

          if (childrenContainer) {
            const icon = nodeContent?.querySelector('.toggle-icon');
            if (icon) icon.classList.add('expanded');
            childrenContainer.classList.add('expanded');
            expandedNodes.add(code);
          }
        }
      });
    }

    // 展开单个节点
    function expandNode(code) {
      if (expandedNodes.has(code)) return;

      const childrenContainer = document.querySelector(`.children-container[data-code="${code}"]`);
      const nodeContent = document.querySelector(`.node-content[data-code="${code}"]`);

      if (childrenContainer) {
        const icon = nodeContent?.querySelector('.toggle-icon');
        if (icon) icon.classList.add('expanded');
        childrenContainer.classList.add('expanded');
        expandedNodes.add(code);
      }
    }

    // 高亮匹配的文字（按字符高亮）
    function highlightName(node, matchedType, matchedInfo, query) {
      const content = document.querySelector(`.node-content[data-code="${node.code}"]`);
      if (!content) return;

      const nameSpan = content.querySelector('.node-name');
      if (!nameSpan) return;

      // 添加匹配标记
      content.classList.add('matched');

      // 重建高亮的名称
      if (matchedType === 'pinyin' && matchedInfo) {
        // 拼音匹配：始终高亮整个名称
        const text = node.name;
        nameSpan.innerHTML = '<mark class="name-highlight">' + text + '</mark>';
      } else if (matchedType === 'name') {
        // 中文匹配：精确匹配关键词并高亮
        const text = node.name;
        const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
        nameSpan.innerHTML = text.replace(regex, '<mark class="name-highlight">$1</mark>');
      } else if (matchedType === 'code') {
        // code 匹配：不做特殊处理，保持原样
      } else if (matchedType === 'description') {
        // 仅 description 匹配，不高亮名称
      }
    }

    // 高亮详情中的关键字
    function highlightDescription(code, query) {
      const panel = document.querySelector(`.description-panel[data-code="${code}"]`);
      if (panel && query) {
        const content = panel.querySelector('.description-content');
        if (content) {
          // 高亮匹配的关键字（使用mark标签）
          const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
          content.innerHTML = content.textContent.replace(regex, '<mark class="desc-highlight">$1</mark>');
        }
      }
    }

    // 转义正则特殊字符
    function escapeRegex(str) {
      return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    // 清除高亮
    function clearHighlights() {
      // 清除节点高亮
      document.querySelectorAll('.node-content.matched').forEach(el => {
        el.classList.remove('matched');
      });
      document.querySelectorAll('.node-content.highlight').forEach(el => {
        el.classList.remove('highlight');
      });
      // 清除名称中的高亮
      document.querySelectorAll('.name-highlight').forEach(el => {
        el.outerHTML = el.textContent;
      });
      // 清除详情中的高亮
      document.querySelectorAll('.desc-highlight').forEach(el => {
        el.outerHTML = el.textContent;
      });
      // 折叠所有展开的节点
      document.querySelectorAll('.children-container.expanded').forEach(el => {
        el.classList.remove('expanded');
      });
      document.querySelectorAll('.toggle-icon.expanded').forEach(el => {
        el.classList.remove('expanded');
      });
      // 折叠所有展开的详情
      document.querySelectorAll('.description-panel.expanded').forEach(el => {
        el.classList.remove('expanded');
      });
      expandedNodes.clear();
      currentHighlighted.clear();
    }

    // 更新统计信息
    function updateStats(matchCount = null, tip = null) {
      // 优先使用 tip 参数（包含匹配模式信息）
      if (tip !== null && tip !== undefined && tip !== '') {
        statsEl.textContent = tip;
        return;
      }
      if (matchCount !== null) {
        statsEl.textContent = matchCount > 0
          ? `找到 ${matchCount} 个匹配结果`
          : '未找到匹配结果';
        return;
      }
      // 无参数时统计细类数量
      let leafCount = 0;
      function countLeaves(node) {
        if (node.level === 4) {
          leafCount++;
        }
        if (node.children) {
          node.children.forEach(countLeaves);
        }
      }
      countLeaves(treeData);
      statsEl.textContent = `共 ${leafCount} 个细类`;
    }

    // 事件监听
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') {
        performSearch(searchInput.value);
      }
    });

    clearBtn.addEventListener('click', () => {
      searchInput.value = '';
      clearHighlights();
      isSearching = false;

      // 恢复原始树HTML
      treeContent.innerHTML = originalTreeHTML;

      // 重新绑定事件（因为innerHTML会丢失事件）
      rebindTreeEvents();

      // 折叠所有节点（恢复到初始状态）
      document.querySelectorAll('.children-container.expanded').forEach(el => {
        el.classList.remove('expanded');
      });
      document.querySelectorAll('.toggle-icon.expanded').forEach(el => {
        el.classList.remove('expanded');
      });
      document.querySelectorAll('.description-panel.expanded').forEach(el => {
        el.classList.remove('expanded');
      });
      expandedNodes.clear();
      updateStats();
      searchInput.focus();
    });

    // 重新绑定树事件
    function rebindTreeEvents() {
      // 绑定所有有子节点的展开/折叠事件
      document.querySelectorAll('.tree-node').forEach(nodeWrapper => {
        const code = nodeWrapper.dataset.code;
        const content = nodeWrapper.querySelector('.node-content');
        const childrenContainer = nodeWrapper.querySelector('.children-container');
        const toggleIcon = nodeWrapper.querySelector('.toggle-icon');

        if (childrenContainer && content && toggleIcon) {
          content.addEventListener('click', (e) => {
            e.stopPropagation();
            toggleNode(code, toggleIcon, childrenContainer);
          });
        } else if (content && code) {
          // 检查是否是4位节点（需要显示详细说明）
          const isLevel4 = content.dataset.level === '4';
          if (isLevel4) {
            content.addEventListener('click', (e) => {
              e.stopPropagation();
              toggleDescription(code);
            });
          }
        }
      });
    }

    // 启动
    init();
  </script>
</body>
</html>
